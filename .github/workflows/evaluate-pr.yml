name: Evaluate Agent PR

on:
  pull_request:
    paths:
      - 'data/agents/**'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Find changed agent files
        id: changed
        run: |
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} -- 'data/agents/*.json' | grep -v '_template')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Found changed files: $FILES"

      - name: Evaluate agents
        id: eval
        run: |
          COMMENT=""
          for file in ${{ steps.changed.outputs.files }}; do
            if [ -f "$file" ]; then
              OUTPUT=$(npx tsx scripts/evaluate-agent.ts "$file" 2>&1)
              SCORE=$(echo "$OUTPUT" | head -1)
              COMMENT="${COMMENT}\n| \`$(basename $file)\` | ${SCORE} |"
            fi
          done
          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo -e "## Agent Quality Evaluation\n\n| File | Score |\n|------|-------|\n${COMMENT}\n\n*Scores are automated and based on completeness (fields filled, topics with YAML, tools listed, etc.)*" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post evaluation comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${{ steps.eval.outputs.comment }}`
            })
