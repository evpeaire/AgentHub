name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Evaluate all agents
        run: npm run evaluate

      - name: Build site
        run: npm run build -- --base=/${{ github.event.repository.name }}/
        env:
          VITE_GITHUB_CLIENT_ID: Ov23liaKEXBnfl9YEcqe
          VITE_REPO_OWNER: evpeaire
          VITE_REPO_NAME: AgentHub
          VITE_OAUTH_PROXY_URL: https://agent-hub-oauth.evpeaire.workers.dev
          VITE_GISCUS_REPO: evpeaire/AgentHub
          VITE_GISCUS_REPO_ID: R_kgDOSByoGA
          VITE_GISCUS_CATEGORY_ID: DIC_kwDOSByoGM4C608f

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
